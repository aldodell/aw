<body>
    <script>

        function setValueAsAttribute(element) {
            switch (element.nodeName.toLowerCase()) {
                case "input":
                    if (element.value != undefined && element.value != "") {
                        element.setAttribute("value", element.value);
                    }
                    break;
                case "select":
                    for (let option of element.options) {
                        if (option.value == element.value) {
                            option.setAttribute("selected", "");
                            break;
                        }
                    }
                    break;
            }


        }

        function recorrer(elemento) {
            if (elemento.value != null) {
                setValueAsAttribute(elemento);
            }
            if (elemento.children != null) {
                for (let i = 0; i < elemento.children.length; i++) {
                    recorrer(elemento.children[i]);
                }
            }
        }

        function imprimir_enviar() {
            let raiz = document.getElementsByTagName("html")[0];
            recorrer(raiz);
            console.log(raiz.innerHTML);
        }
    </script>

    <form method="post" action="b.php">

            <option value="2">B</option>
            <option value="3">C</option>
        </select>
    </form>

    <input type="button" value="Imprimir y enviar" onclick="imprimir_enviar();">
</body>
